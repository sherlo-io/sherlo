# The file:../../packages/react-native-storybook ref hashes the SDK's packed
# content, which is not byte-stable across machines (TypeScript build output
# varies between local dev and CI). Allow the lockfile to refresh that one
# entry so CI installs do not fail on the hash drift; npm: refs stay pinned by
# the committed lockfile regardless.
enableImmutableInstalls: false

yarnPath: ../../.yarn/releases/yarn-4.12.0.cjs
