name: Release to Test

on:
  workflow_dispatch:

jobs:
  release-to-test:
    runs-on: ubuntu-latest
    concurrency: release-to-test
    permissions:
      contents: read
      packages: write
    outputs:
      test-version: ${{ steps.publish.outputs.test-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@sherlo-io'

      - name: Download Sherlo packages
        run: ./scripts/init-env.sh
        env:
          CLIENT_STAGE: test
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Install dependencies
        run: yarn

      - name: Build packages
        run: yarn build
        env:
          NX_SKIP_NX_CACHE: true

      - name: Save version number to native dependencies
        run: |
          VERSION=$(node -p "require('./lerna.json').version")
          echo "{\"version\": \"$VERSION\"}" > packages/react-native-storybook/android/src/main/assets/sherlo.json
          echo "{\"version\": \"$VERSION\"}" > packages/react-native-storybook/ios/Resources/assets/sherlo.json

      - name: Prepare and publish to GitHub Packages
        id: publish
        run: |
          VERSION=$(node -p "require('./lerna.json').version")
          TEST_VERSION="${VERSION}-test.${GITHUB_RUN_ID}"
          echo "test-version=${TEST_VERSION}" >> $GITHUB_OUTPUT

          node -e "
            const fs = require('fs');

            const cli = JSON.parse(fs.readFileSync('packages/cli/package.json', 'utf8'));
            cli.name = '@sherlo-io/cli';
            cli.version = '${TEST_VERSION}';
            cli.publishConfig = { registry: 'https://npm.pkg.github.com', access: 'restricted' };
            fs.writeFileSync('packages/cli/package.json', JSON.stringify(cli, null, 2) + '\n');

            const sdk = JSON.parse(fs.readFileSync('packages/react-native-storybook/package.json', 'utf8'));
            sdk.name = '@sherlo-io/react-native-storybook';
            sdk.version = '${TEST_VERSION}';
            sdk.publishConfig = { registry: 'https://npm.pkg.github.com', access: 'restricted' };
            fs.writeFileSync('packages/react-native-storybook/package.json', JSON.stringify(sdk, null, 2) + '\n');
          "

          cd packages/cli && npm publish --tag test
          cd ../react-native-storybook && npm publish --tag test
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
