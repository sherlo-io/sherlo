name: Release to Dev

on:
  workflow_dispatch:
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: read

jobs:
  release-to-dev:
    runs-on: ubuntu-latest
    concurrency: release-to-dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download Sherlo packages
        run: ./scripts/init-env.sh
        env:
          CLIENT_STAGE: dev
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Install dependencies
        run: yarn

      - name: Set dev prerelease version
        run: |
          VERSION=$(node -p "require('./lerna.json').version")
          npx lerna version ${VERSION}-dev.${GITHUB_RUN_ID} --yes --no-git-tag-version --no-push

      - name: Build packages
        run: yarn build

      - name: Commit version bump (local only)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "chore: dev version bump" --allow-empty

      - name: Publish to npm with dev tag
        run: npx lerna publish from-package --no-private --yes --dist-tag dev --no-git-reset
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
